<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morse Invaders</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #001022;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: monospace;
    }
    #gameCanvas {
      border: 2px solid #cc2020;
      box-shadow: 0 0 20px rgba(204, 32, 32, 0.25);
    }
  </style>
</head>
<body>
  <div style="position:absolute;top:30px;left:50%;transform:translateX(-50%);z-index:10;text-align:center;">
    <input id="customWordsInput" type="text" placeholder="Paste or type words here..." style="width:400px;font-size:16px;padding:6px 10px;border:1px solid #335b86;background:#011126;color:#bfe6ff;outline:none;border-radius:4px;">
    <button id="addWordsBtn" style="font-size:16px;padding:6px 12px;margin-left:8px;background:#cc2020;color:#fff;border:none;cursor:pointer;border-radius:4px;">Add Words</button>
    <div id="addWordsMsg" style="color:#bfe6ff;font-size:14px;margin-top:6px;min-height:18px;"></div>
  </div>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <script type="module" src="js/main.js"></script>
</body>
</html>
